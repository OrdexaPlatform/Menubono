<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BONO | سلة الطلبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="main-header">
      <div class="logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">سلة الطلبات</span>
      </div>
      <div class="header-actions">
        <button id="backToMenuBtn" class="icon-btn">← العودة</button>
      </div>
    </header>

    <main class="cart-main">
      <div class="cart-items-section" id="cartItemsSection">
        <!-- سيتم عرض السلة ديناميكياً -->
      </div>

      <div class="order-summary">
        <h3>ملخص الطلب</h3>
        <div class="summary-row">
          <span>المجموع الفرعي</span>
          <span id="subtotal">0</span> ج.م
        </div>
        <div class="summary-row">
          <span>الضريبة (10%)</span>
          <span id="tax">0</span> ج.م
        </div>
        <div class="summary-row">
          <span>رسوم التوصيل</span>
          <span id="deliveryFee">0</span> ج.م
        </div>
        <div class="summary-row total">
          <span>الإجمالي</span>
          <span id="total">0</span> ج.م
        </div>
      </div>

      <div class="customer-info-card">
        <h3>معلومات التوصيل</h3>
        <input type="text" id="custName" placeholder="الاسم الكامل *">
        <input type="tel" id="custPhone" placeholder="رقم الجوال *">
        <input type="tel" id="altPhone" placeholder="رقم بديل (اختياري)">
        <select id="governorateSelect">
          <option value="Qalyubia">القليوبية</option>
          <option value="Cairo">القاهرة</option>
        </select>
        <select id="citySelect"></select>
        <textarea id="fullAddress" rows="2" placeholder="العنوان بالكامل + معلم بارز *"></textarea>
        <button id="confirmOrderBtn" class="confirm-order-btn">✅ تأكيد الطلب وإرسال</button>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🍽️ المنيو</a>
      <a href="cart.html" class="nav-item active">🛒 السلة</a>
      <a href="manage-items.html" class="nav-item">⚙️ إدارة</a>
      <a href="backgrounds.html" class="nav-item">🎨 خلفيات</a>
    </nav>
  </div>

  <script src="common.js"></script>
  <script>
    let currentCart = [];

    function updateCities() {
      const gov = document.getElementById('governorateSelect').value;
      const citySelect = document.getElementById('citySelect');
      const options = gov === 'Qalyubia' ? ['الخصوص', 'بنها', 'شبرا الخيمة'] : ['مدينة نصر', 'التجمع الخامس', 'مصر الجديدة'];
      citySelect.innerHTML = options.map(c => `<option value="${c}">${c}</option>`).join('');
      updateTotals();
    }

    function getDeliveryFee() {
      const gov = document.getElementById('governorateSelect').value;
      return gov === 'Qalyubia' ? 20 : 30;
    }

    function updateTotals() {
      const subtotal = currentCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const tax = subtotal * 0.1;
      const delivery = getDeliveryFee();
      const total = subtotal + tax + delivery;
      document.getElementById('subtotal').innerText = subtotal.toFixed(2);
      document.getElementById('tax').innerText = tax.toFixed(2);
      document.getElementById('deliveryFee').innerText = delivery;
      document.getElementById('total').innerText = total.toFixed(2);
    }

    function renderCartItems() {
      const container = document.getElementById('cartItemsSection');
      if (!currentCart.length) {
        container.innerHTML = `<div class="empty-cart">🛒 سلة المشتريات فارغة<br><a href="index.html">اذهب لاستعراض المنيو</a></div>`;
        updateTotals();
        return;
      }

      container.innerHTML = currentCart.map(item => `
        <div class="cart-item" data-id="${item.id}">
          <div class="cart-item-info">
            <h4>${item.name}</h4>
            <div class="cart-item-price">${item.price} ج.م</div>
          </div>
          <div class="cart-item-controls">
            <button class="qty-decr" data-id="${item.id}">−</button>
            <span class="qty-num">${item.quantity}</span>
            <button class="qty-incr" data-id="${item.id}">+</button>
            <button class="remove-item-btn" data-id="${item.id}">🗑️</button>
          </div>
        </div>
      `).join('');

      // أحداث التحكم في الكمية
      document.querySelectorAll('.qty-incr').forEach(btn => {
        btn.onclick = () => changeQuantity(btn.getAttribute('data-id'), 1);
      });
      document.querySelectorAll('.qty-decr').forEach(btn => {
        btn.onclick = () => changeQuantity(btn.getAttribute('data-id'), -1);
      });
      document.querySelectorAll('.remove-item-btn').forEach(btn => {
        btn.onclick = () => removeItem(btn.getAttribute('data-id'));
      });
      updateTotals();
    }

    function changeQuantity(id, delta) {
      let cart = getCart();
      const index = cart.findIndex(i => i.id === id);
      if (index !== -1) {
        const newQty = cart[index].quantity + delta;
        if (newQty <= 0) {
          cart.splice(index, 1);
        } else {
          cart[index].quantity = newQty;
        }
        saveCart(cart);
        loadCartAndRender();
      }
    }

    function removeItem(id) {
      let cart = getCart();
      cart = cart.filter(i => i.id !== id);
      saveCart(cart);
      loadCartAndRender();
    }

    function loadCartAndRender() {
      currentCart = getCartWithDetails();
      renderCartItems();
      updateCartBadgeGlobal();
    }

    function updateCartBadgeGlobal() {
      const cart = getCart();
      const total = cart.reduce((s, i) => s + i.quantity, 0);
      const badge = document.getElementById('cartCountBadge');
      if (badge) badge.innerText = total;
      // تحديث أيقونة السلة في الصفحة الحالية غير موجودة، لكن ننفذ للتأكد
    }

    async function sendOrder() {
      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const altPhone = document.getElementById('altPhone').value.trim();
      const gov = document.getElementById('governorateSelect').options[document.getElementById('governorateSelect').selectedIndex]?.text;
      const city = document.getElementById('citySelect').value;
      const address = document.getElementById('fullAddress').value.trim();

      if (!name || !phone || !address) {
        alert('❌ الرجاء ملء جميع الحقول المطلوبة');
        return;
      }
      if (!currentCart.length) {
        alert('🛒 السلة فارغة');
        return;
      }

      const orderNumber = getNextOrderNumber();
      let itemsText = '';
      currentCart.forEach(item => {
        itemsText += `${item.name} × ${item.quantity} = ${item.price * item.quantity} ج.م\n`;
      });
      const subtotal = currentCart.reduce((s, i) => s + (i.price * i.quantity), 0);
      const tax = subtotal * 0.1;
      const delivery = getDeliveryFee();
      const total = subtotal + tax + delivery;
      const altLine = altPhone ? `📞 بديل: ${altPhone}\n` : '';

      const msg = `🍔 طلب جديد من BONO 🍔
🧾 رقم #${orderNumber}

👤 الاسم: ${name}
📞 جوال: ${phone}
${altLine}📍 العنوان: ${address}, ${city} - ${gov}
--------------------------------
${itemsText}
💰 المجموع: ${subtotal} ج.م
🧾 ضريبة: ${tax} ج.م
🚚 توصيل: ${delivery} ج.م
💵 الإجمالي: ${total} ج.م

نشكرك على طلبك!`;

      const BOT_TOKEN = "8748571642:AAGMmoWmXH3ewRPow5igyacYkamBpeJ3jd0";
      const CHAT_ID = "987968411";
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
        });
        const data = await res.json();
        if (data.ok) {
          alert(`✅ تم إرسال طلبك بنجاح! رقم الطلب: ${orderNumber}`);
          clearCart();
          loadCartAndRender();
          document.getElementById('custName').value = '';
          document.getElementById('custPhone').value = '';
          document.getElementById('altPhone').value = '';
          document.getElementById('fullAddress').value = '';
          updateTotals();
        } else {
          alert('❌ فشل الإرسال إلى تليجرام');
        }
      } catch (err) {
        alert('❌ خطأ في الشبكة');
      }
    }

    // تهيئة الصفحة
    initData();
    loadCartAndRender();
    updateCities();
    document.getElementById('governorateSelect').addEventListener('change', () => { updateCities(); updateTotals(); });
    document.getElementById('citySelect').addEventListener('change', () => updateTotals());
    document.getElementById('confirmOrderBtn').addEventListener('click', sendOrder);
    document.getElementById('backToMenuBtn').addEventListener('click', () => window.location.href = 'index.html');
  </script>
</body>
</html>

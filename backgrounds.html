<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BONO | تخصيص المظهر</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .bg-card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .preview-img {
      margin: 12px 0;
      max-width: 200px;
      border-radius: 16px;
    }
    button {
      background: var(--gold);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="main-header">
      <div class="logo">🎨 تخصيص الموقع</div>
      <div class="header-actions">
        <button id="backBtn" class="icon-btn">← العودة</button>
      </div>
    </header>
    <main style="padding: 20px;">
      <div class="bg-card">
        <h3>صورة خلفية الهيدر (البنر)</h3>
        <input type="file" id="heroImgInput" accept="image/*">
        <div id="heroPreview" class="preview-img"></div>
        <button id="saveHeroBtn">حفظ الخلفية</button>
      </div>
      <div class="bg-card">
        <h3>الصورة الافتراضية للأصناف</h3>
        <input type="file" id="defaultImgInput" accept="image/*">
        <div id="defaultPreview" class="preview-img"></div>
        <button id="saveDefaultBtn">حفظ الصورة الافتراضية</button>
      </div>
      <div class="bg-card">
        <h3>عنوان الموقع والنص الفرعي</h3>
        <input type="text" id="siteTitle" placeholder="العنوان الرئيسي">
        <input type="text" id="siteSubtitle" placeholder="النص الفرعي" style="margin-top: 12px;">
        <button id="saveTextsBtn" style="margin-top: 16px;">حفظ النصوص</button>
      </div>
    </main>
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🍽️ المنيو</a>
      <a href="cart.html" class="nav-item">🛒 السلة</a>
      <a href="manage-items.html" class="nav-item">⚙️ إدارة</a>
      <a href="backgrounds.html" class="nav-item active">🎨 خلفيات</a>
    </nav>
  </div>
  <script src="common.js"></script>
  <script>
    function previewFile(input, previewId) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" width="150" style="border-radius: 12px;">`;
        };
        reader.readAsDataURL(file);
      }
    }
    document.getElementById('heroImgInput').onchange = () => previewFile(document.getElementById('heroImgInput'), 'heroPreview');
    document.getElementById('defaultImgInput').onchange = () => previewFile(document.getElementById('defaultImgInput'), 'defaultPreview');

    function loadSettings() {
      const bg = getBackgroundSettings();
      if (bg.heroImage) document.getElementById('heroPreview').innerHTML = `<img src="${bg.heroImage}" width="150">`;
      if (bg.defaultItemImage) document.getElementById('defaultPreview').innerHTML = `<img src="${bg.defaultItemImage}" width="150">`;
      document.getElementById('siteTitle').value = bg.siteTitle || '';
      document.getElementById('siteSubtitle').value = bg.siteSubtitle || '';
    }

    async function saveHero() {
      const file = document.getElementById('heroImgInput').files[0];
      if (file) {
        const base64 = await readFileAsBase64(file);
        const settings = getBackgroundSettings();
        settings.heroImage = base64;
        saveBackgroundSettings(settings);
        alert('تم حفظ خلفية الهيدر');
      } else alert('اختر صورة أولاً');
    }
    async function saveDefault() {
      const file = document.getElementById('defaultImgInput').files[0];
      if (file) {
        const base64 = await readFileAsBase64(file);
        const settings = getBackgroundSettings();
        settings.defaultItemImage = base64;
        saveBackgroundSettings(settings);
        alert('تم حفظ الصورة الافتراضية');
      }
    }
    function saveTexts() {
      const settings = getBackgroundSettings();
      settings.siteTitle = document.getElementById('siteTitle').value;
      settings.siteSubtitle = document.getElementById('siteSubtitle').value;
      saveBackgroundSettings(settings);
      alert('تم حفظ النصوص');
    }
    function readFileAsBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }
    initData();
    loadSettings();
    document.getElementById('saveHeroBtn').onclick = saveHero;
    document.getElementById('saveDefaultBtn').onclick = saveDefault;
    document.getElementById('saveTextsBtn').onclick = saveTexts;
    document.getElementById('backBtn').onclick = () => window.location.href = 'index.html';
  </script>
</body>
</html>

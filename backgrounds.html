<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BONO | إعدادات الخلفيات</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #0a0a0a; color: #fff; direction: rtl; }
    .app { max-width: 600px; margin: 0 auto; background: #0f0f0f; min-height: 100vh; padding-bottom: 75px; }
    .main-header { position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #2a2a2a; }
    .logo { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #f5b642, #ffdd99); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logout-btn { background: #2c2c2c; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; color: #f5b642; }
    .backgrounds-page { padding: 20px; }
    .bg-group { background: #1c1c1c; padding: 20px; border-radius: 24px; margin-bottom: 20px; }
    .bg-group h3 { margin-bottom: 12px; color: #f5b642; }
    .bg-group input, .bg-group button { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 40px; background: #242424; border: 1px solid #3d3d3d; color: white; }
    .bg-group button { background: #f5b642; color: #0a0a0a; font-weight: bold; border: none; cursor: pointer; }
    .preview-img { max-width: 100%; border-radius: 16px; margin-top: 8px; }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a2a2a; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #aaa; text-decoration: none; font-size: 0.7rem; }
    .nav-item.active { color: #f5b642; font-weight: bold; }
    .nav-icon { font-size: 1.4rem; }
  </style>
</head>
<body>
<div class="app">
  <header class="main-header"><div class="logo">🎨 تخصيص المظهر</div><button id="logoutBtn" class="logout-btn">تسجيل خروج</button></header>
  <div id="adminContent" style="display: none;">
    <div class="backgrounds-page">
      <div class="bg-group"><h3>صورة خلفية الهيدر</h3><input type="file" id="heroImageInput" accept="image/*"><div id="heroPreview"></div><button id="saveHeroBtn">حفظ الخلفية</button></div>
      <div class="bg-group"><h3>الصورة الافتراضية للأصناف</h3><input type="file" id="defaultImgInput" accept="image/*"><div id="defaultPreview"></div><button id="saveDefaultBtn">حفظ الصورة الافتراضية</button></div>
      <div class="bg-group"><h3>عنوان الموقع</h3><input type="text" id="siteTitleInput" placeholder="عنوان الموقع"><h3>النص الفرعي</h3><input type="text" id="siteSubtitleInput" placeholder="النص الفرعي"><button id="saveTextsBtn">حفظ النصوص</button></div>
    </div>
  </div>
  <div id="loginPanel" style="text-align:center; padding: 50px 20px;"><h2>تسجيل دخول المدير</h2><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:90%; margin:10px 0; padding:12px; border-radius:40px; background:#1c1c1c; border:1px solid #f5b642; color:white;"><input type="password" id="loginPassword" placeholder="كلمة المرور" style="width:90%; margin:10px 0; padding:12px; border-radius:40px; background:#1c1c1c; border:1px solid #f5b642; color:white;"><button id="loginBtn" style="background:#f5b642; border:none; padding:10px 30px; border-radius:40px; font-weight:bold;">دخول</button></div>
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><span class="nav-icon">🍽️</span><span>المنيو</span></a><a href="cart.html" class="nav-item"><span class="nav-icon">🛒</span><span>السلة</span></a><a href="manage-items.html" class="nav-item"><span class="nav-icon">⚙️</span><span>إدارة</span></a><a href="backgrounds.html" class="nav-item active"><span class="nav-icon">🎨</span><span>خلفيات</span></a></nav>
</div>
<div id="dynamicToast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#f5b642; color:#000; padding:8px 20px; border-radius:60px; z-index:999; opacity:0; transition:0.2s;"></div>
<script type="module">
  import { signInAdmin, signOutAdmin, onAdminStateChanged, getBackgroundSettings, saveBackgroundSettings, uploadImageToCloudinary } from './common.js';
  function showToast(msg) { const t = document.getElementById('dynamicToast'); t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
  function showPreview(divId, src) { document.getElementById(divId).innerHTML = `<img src="${src}" class="preview-img" width="150">`; }
  async function loadSettings() {
    const s = await getBackgroundSettings();
    if (s.heroImage) showPreview('heroPreview', s.heroImage);
    if (s.defaultItemImage) showPreview('defaultPreview', s.defaultItemImage);
    document.getElementById('siteTitleInput').value = s.siteTitle || '';
    document.getElementById('siteSubtitleInput').value = s.siteSubtitle || '';
  }
  async function saveHero() {
    const file = document.getElementById('heroImageInput').files[0];
    if (!file) return alert('اختر صورة');
    const url = await uploadImageToCloudinary(file);
    const settings = await getBackgroundSettings();
    settings.heroImage = url;
    await saveBackgroundSettings(settings);
    showPreview('heroPreview', url);
    showToast('تم حفظ خلفية الهيدر');
  }
  async function saveDefault() {
    const file = document.getElementById('defaultImgInput').files[0];
    if (!file) return alert('اختر صورة');
    const url = await uploadImageToCloudinary(file);
    const settings = await getBackgroundSettings();
    settings.defaultItemImage = url;
    await saveBackgroundSettings(settings);
    showPreview('defaultPreview', url);
    showToast('تم حفظ الصورة الافتراضية');
  }
  async function saveTexts() {
    const settings = await getBackgroundSettings();
    settings.siteTitle = document.getElementById('siteTitleInput').value;
    settings.siteSubtitle = document.getElementById('siteSubtitleInput').value;
    await saveBackgroundSettings(settings);
    showToast('تم حفظ النصوص');
  }
  function showAdminPanel(show) {
    document.getElementById('adminContent').style.display = show ? 'block' : 'none';
    document.getElementById('loginPanel').style.display = show ? 'none' : 'block';
    if (show) loadSettings();
  }
  onAdminStateChanged(async (user) => {
    if (user && user.uid === "N5eoY38WByPKKBFeXBiEjW54TZg1") showAdminPanel(true);
    else showAdminPanel(false);
  });
  document.getElementById('loginBtn').onclick = async () => { try { await signInAdmin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); showToast('تم الدخول'); } catch(e) { alert('فشل الدخول'); } };
  document.getElementById('logoutBtn').onclick = async () => { await signOutAdmin(); showToast('تم الخروج'); };
  document.getElementById('saveHeroBtn').onclick = saveHero;
  document.getElementById('saveDefaultBtn').onclick = saveDefault;
  document.getElementById('saveTextsBtn').onclick = saveTexts;
</script>
</body>
</html>

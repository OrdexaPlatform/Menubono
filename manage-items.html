<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BONO | إدارة المنيو</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"><style>/* نفس التصميم السابق مع إضافات بسيطة */ body{background:#0a0a0a;color:#f0efe7;font-family:'Inter',sans-serif;direction:rtl}.app{max-width:600px;margin:0 auto;background:#0f0f0f;min-height:100vh;padding-bottom:70px}.admin-section{background:#111;border-radius:28px;margin:20px;padding:16px}.section-header{display:flex;justify-content:space-between;margin-bottom:16px}.add-btn{background:#f5b642;border:none;padding:8px 16px;border-radius:40px;font-weight:bold;cursor:pointer}.admin-card{background:#1c1c1c;border-radius:20px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000}.modal-content{background:#151515;width:90%;max-width:500px;border-radius:32px;padding:24px}.modal-content input,select{width:100%;margin-bottom:12px;padding:12px;background:#242424;border:1px solid #3d3d3d;border-radius:28px;color:white}.modal-actions{display:flex;gap:12px;justify-content:end}.save-btn{background:#f5b642}.cancel-btn{background:#2c2c2c}</style></head>
<body>
<div class="app">
  <header class="main-header" style="display:flex;justify-content:space-between;padding:16px"><div class="logo">لوحة التحكم</div><button id="logoutBtn" style="background:#2c2c2c;border:none;padding:6px 12px;border-radius:30px;color:#f5b642">تسجيل خروج</button></header>
  <div id="adminContent" style="display:none">
    <div class="admin-section"><div class="section-header"><h2>📂 الفئات</h2><button id="addCategoryBtn" class="add-btn">+ إضافة فئة</button></div><div id="categoriesList"></div></div>
    <div class="admin-section"><div class="section-header"><h2>🍔 الأصناف</h2><button id="addItemBtn" class="add-btn">+ إضافة صنف</button></div><div id="itemsList"></div></div>
  </div>
  <div id="loginPanel" style="text-align:center;padding:40px"><h2>تسجيل الدخول للمدير</h2><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="width:80%;padding:12px;margin:10px"><input type="password" id="loginPassword" placeholder="كلمة المرور" style="width:80%;padding:12px;margin:10px"><button id="doLoginBtn" style="background:#f5b642;border:none;padding:10px 30px;border-radius:40px">دخول</button></div>
  <nav class="bottom-nav"><a href="index.html" class="nav-item">🍽️ المنيو</a><a href="cart.html" class="nav-item">🛒 السلة</a><a href="manage-items.html" class="nav-item active">⚙️ إدارة</a><a href="backgrounds.html" class="nav-item">🎨 خلفيات</a></nav>
</div>
<div id="modal" class="modal"><div class="modal-content"><h3 id="modalTitle"></h3><div id="modalBody"></div><div class="modal-actions"><button id="modalSave" class="save-btn">حفظ</button><button id="modalCancel" class="cancel-btn">إلغاء</button></div></div></div>
<script type="module">
  import { auth, signInWithEmailAndPassword, onAuthStateChanged } from './firebase-init.js';
  import { getAllCategories, addCategory, updateCategory, deleteCategory, getAllMenuItems, addMenuItem, updateMenuItem, deleteMenuItem, uploadImageToCloudinary, showToast } from './common.js';
  let currentUser = null;
  let modalType = null, editingId = null;

  function showAdminPanel() { document.getElementById('adminContent').style.display = 'block'; document.getElementById('loginPanel').style.display = 'none'; renderCategories(); renderItems(); }
  function showLoginPanel() { document.getElementById('adminContent').style.display = 'none'; document.getElementById('loginPanel').style.display = 'block'; }

  onAuthStateChanged(auth, (user) => { if(user) { currentUser = user; showAdminPanel(); } else { currentUser = null; showLoginPanel(); } });
  document.getElementById('doLoginBtn').onclick = async () => { const email=document.getElementById('loginEmail').value, pwd=document.getElementById('loginPassword').value; try{ await signInWithEmailAndPassword(auth, email, pwd); } catch(e){ alert('بيانات غير صحيحة'); } };
  document.getElementById('logoutBtn').onclick = () => auth.signOut();

  async function renderCategories() { const cats = await getAllCategories(); const container = document.getElementById('categoriesList'); if(!cats.length){ container.innerHTML='<div class="empty">لا توجد فئات</div>'; return; } container.innerHTML = cats.map(c => `<div class="admin-card"><div><strong>${c.nameAr}</strong></div><div><button class="editCat" data-id="${c.id}" data-name="${c.nameAr}">✏️</button> <button class="delCat" data-id="${c.id}">🗑️</button></div></div>`).join(''); document.querySelectorAll('.editCat').forEach(btn => btn.onclick = () => openCategoryModal('edit', btn.dataset.id, btn.dataset.name)); document.querySelectorAll('.delCat').forEach(btn => btn.onclick = async () => { if(confirm('حذف الفئة سيحذف كل أصنافها')){ await deleteCategory(btn.dataset.id); renderCategories(); renderItems(); showToast('تم الحذف'); } }); }
  async function renderItems() { const items = await getAllMenuItems(); const cats = await getAllCategories(); const container = document.getElementById('itemsList'); if(!items.length){ container.innerHTML='<div class="empty">لا توجد أصناف</div>'; return; } container.innerHTML = items.map(i => `<div class="admin-card"><div><strong>${i.nameAr}</strong> - ${i.price} ج.م - ${cats.find(c=>c.id===i.categoryId)?.nameAr||''}<br><small>${i.imageUrl ? '🖼️ صورة' : 'بدون صورة'}</small></div><div><button class="editItem" data-id="${i.id}">✏️</button> <button class="delItem" data-id="${i.id}">🗑️</button></div></div>`).join(''); document.querySelectorAll('.editItem').forEach(btn => btn.onclick = () => openItemModal('edit', btn.dataset.id)); document.querySelectorAll('.delItem').forEach(btn => btn.onclick = async () => { if(confirm('حذف الصنف؟')){ await deleteMenuItem(btn.dataset.id); renderItems(); showToast('تم الحذف'); } }); }

  function openCategoryModal(action, id=null, name='') { modalType='category'; editingId=id; document.getElementById('modalTitle').innerText = action==='edit'?'تعديل فئة':'إضافة فئة'; document.getElementById('modalBody').innerHTML = `<input id="catName" placeholder="اسم الفئة" value="${name}">`; document.getElementById('modal').style.display='flex'; }
  function openItemModal(action, id=null) { modalType='item'; editingId=id; (async()=>{ const cats = await getAllCategories(); let selected='', name='', desc='', price=''; if(action==='edit' && id){ const items = await getAllMenuItems(); const it = items.find(i=>i.id===id); if(it){ name=it.nameAr; desc=it.descAr||''; price=it.price; selected=it.categoryId; } } const catOptions = cats.map(c=>`<option value="${c.id}" ${selected===c.id?'selected':''}>${c.nameAr}</option>`).join(''); document.getElementById('modalBody').innerHTML = `<input id="itemName" placeholder="الاسم" value="${name}"><input id="itemDesc" placeholder="الوصف" value="${desc}"><input id="itemPrice" type="number" placeholder="السعر" value="${price}"><select id="itemCat">${catOptions}</select><input type="file" id="itemImage" accept="image/*"><div id="imgPreview"></div>`; document.getElementById('modal').style.display='flex'; })(); }

  document.getElementById('modalSave').onclick = async () => { if(modalType==='category'){ const name = document.getElementById('catName').value.trim(); if(!name) return alert('أدخل اسم الفئة'); if(editingId) await updateCategory(editingId, name); else await addCategory({nameAr:name}); closeModal(); renderCategories(); showToast('تم حفظ الفئة'); } else if(modalType==='item'){ const name = document.getElementById('itemName').value.trim(); const desc = document.getElementById('itemDesc').value.trim(); const price = parseFloat(document.getElementById('itemPrice').value); const catId = document.getElementById('itemCat').value; const file = document.getElementById('itemImage').files[0]; if(!name || isNaN(price)) return alert('الاسم والسعر مطلوبان'); let imageUrl = null; if(file) imageUrl = await uploadImageToCloudinary(file); else if(editingId){ const items = await getAllMenuItems(); const old = items.find(i=>i.id===editingId); if(old) imageUrl = old.imageUrl; } if(editingId) await updateMenuItem(editingId, {nameAr:name, descAr:desc, price, categoryId:catId, imageUrl}); else await addMenuItem({nameAr:name, descAr:desc, price, categoryId:catId, imageUrl}); closeModal(); renderItems(); showToast('تم حفظ الصنف'); } };
  function closeModal() { document.getElementById('modal').style.display='none'; modalType=null; editingId=null; }
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('addCategoryBtn').onclick = () => openCategoryModal('add');
  document.getElementById('addItemBtn').onclick = () => openItemModal('add');
</script>
</body>
</html>
